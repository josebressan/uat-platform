kind = "web"
previewPath = "/"
title = "UAT Platform"
version = "1.0.0"
id = "artifacts/uat-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20220
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/uat-platform run dev"

[services.env]
PORT = "20220"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/uat-platform", "run", "build"]
publicDir = "artifacts/uat-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
