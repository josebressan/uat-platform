openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: UAT Test Management Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User operations
  - name: releases
    description: Release operations
  - name: testCycles
    description: Test cycle operations
  - name: testPlans
    description: Test plan operations
  - name: testCases
    description: Test case operations
  - name: testExecutions
    description: Test execution operations
  - name: defects
    description: Defect operations
  - name: approvals
    description: Approval operations
  - name: dashboard
    description: Dashboard and reporting operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /releases:
    get:
      operationId: listReleases
      tags: [releases]
      summary: List all releases
      responses:
        "200":
          description: List of releases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Release"
    post:
      operationId: createRelease
      tags: [releases]
      summary: Create a release
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReleaseBody"
      responses:
        "201":
          description: Created release
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Release"

  /releases/{id}:
    get:
      operationId: getRelease
      tags: [releases]
      summary: Get release by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Release details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseDetail"
    patch:
      operationId: updateRelease
      tags: [releases]
      summary: Update release
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReleaseBody"
      responses:
        "200":
          description: Updated release
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Release"

  /test-cycles:
    get:
      operationId: listTestCycles
      tags: [testCycles]
      summary: List test cycles
      parameters:
        - name: releaseId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of test cycles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TestCycle"
    post:
      operationId: createTestCycle
      tags: [testCycles]
      summary: Create a test cycle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTestCycleBody"
      responses:
        "201":
          description: Created test cycle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCycle"

  /test-cycles/{id}:
    get:
      operationId: getTestCycle
      tags: [testCycles]
      summary: Get test cycle by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Test cycle details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCycleDetail"
    patch:
      operationId: updateTestCycle
      tags: [testCycles]
      summary: Update test cycle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTestCycleBody"
      responses:
        "200":
          description: Updated test cycle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCycle"

  /test-plans:
    get:
      operationId: listTestPlans
      tags: [testPlans]
      summary: List test plans
      parameters:
        - name: testCycleId
          in: query
          required: false
          schema:
            type: integer
        - name: releaseId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of test plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TestPlan"
    post:
      operationId: createTestPlan
      tags: [testPlans]
      summary: Create a test plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTestPlanBody"
      responses:
        "201":
          description: Created test plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlan"

  /test-plans/{id}:
    get:
      operationId: getTestPlan
      tags: [testPlans]
      summary: Get test plan by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Test plan details with scenarios
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlanDetail"
    patch:
      operationId: updateTestPlan
      tags: [testPlans]
      summary: Update test plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTestPlanBody"
      responses:
        "200":
          description: Updated test plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlan"

  /test-scenarios:
    post:
      operationId: createTestScenario
      tags: [testCases]
      summary: Create a test scenario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTestScenarioBody"
      responses:
        "201":
          description: Created test scenario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestScenario"

  /test-scenarios/{id}:
    get:
      operationId: getTestScenario
      tags: [testCases]
      summary: Get test scenario by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Test scenario with cases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestScenarioDetail"

  /test-cases:
    get:
      operationId: listTestCases
      tags: [testCases]
      summary: List test cases
      parameters:
        - name: testPlanId
          in: query
          required: false
          schema:
            type: integer
        - name: scenarioId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: priority
          in: query
          required: false
          schema:
            type: string
        - name: assigneeId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of test cases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TestCase"
    post:
      operationId: createTestCase
      tags: [testCases]
      summary: Create a test case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTestCaseBody"
      responses:
        "201":
          description: Created test case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCase"

  /test-cases/{id}:
    get:
      operationId: getTestCase
      tags: [testCases]
      summary: Get test case by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Test case details with steps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCaseDetail"
    patch:
      operationId: updateTestCase
      tags: [testCases]
      summary: Update test case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTestCaseBody"
      responses:
        "200":
          description: Updated test case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCase"

  /test-executions:
    get:
      operationId: listTestExecutions
      tags: [testExecutions]
      summary: List test executions
      parameters:
        - name: testCaseId
          in: query
          required: false
          schema:
            type: integer
        - name: testCycleId
          in: query
          required: false
          schema:
            type: integer
        - name: executorId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of test executions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TestExecution"
    post:
      operationId: createTestExecution
      tags: [testExecutions]
      summary: Create a test execution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTestExecutionBody"
      responses:
        "201":
          description: Created test execution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestExecution"

  /test-executions/{id}:
    get:
      operationId: getTestExecution
      tags: [testExecutions]
      summary: Get test execution by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Test execution details with steps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestExecutionDetail"
    patch:
      operationId: updateTestExecution
      tags: [testExecutions]
      summary: Update test execution
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTestExecutionBody"
      responses:
        "200":
          description: Updated test execution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestExecution"

  /test-execution-steps/{id}:
    patch:
      operationId: updateTestExecutionStep
      tags: [testExecutions]
      summary: Update a test execution step result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTestExecutionStepBody"
      responses:
        "200":
          description: Updated step
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestExecutionStep"

  /defects:
    get:
      operationId: listDefects
      tags: [defects]
      summary: List defects
      parameters:
        - name: testExecutionId
          in: query
          required: false
          schema:
            type: integer
        - name: severity
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: assigneeId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of defects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Defect"
    post:
      operationId: createDefect
      tags: [defects]
      summary: Create a defect
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDefectBody"
      responses:
        "201":
          description: Created defect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Defect"

  /defects/{id}:
    get:
      operationId: getDefect
      tags: [defects]
      summary: Get defect by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Defect details with comments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefectDetail"
    patch:
      operationId: updateDefect
      tags: [defects]
      summary: Update defect
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDefectBody"
      responses:
        "200":
          description: Updated defect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Defect"

  /defects/{id}/comments:
    get:
      operationId: listDefectComments
      tags: [defects]
      summary: List comments for a defect
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DefectComment"
    post:
      operationId: createDefectComment
      tags: [defects]
      summary: Add a comment to a defect
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDefectCommentBody"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefectComment"

  /approvals:
    get:
      operationId: listApprovals
      tags: [approvals]
      summary: List approvals
      parameters:
        - name: releaseId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of approvals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Approval"
    post:
      operationId: createApproval
      tags: [approvals]
      summary: Create an approval request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApprovalBody"
      responses:
        "201":
          description: Created approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approval"

  /approvals/{id}:
    get:
      operationId: getApproval
      tags: [approvals]
      summary: Get approval by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approval details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalDetail"
    patch:
      operationId: updateApproval
      tags: [approvals]
      summary: Update approval (approve/reject)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApprovalBody"
      responses:
        "200":
          description: Updated approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approval"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard KPI stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/defect-summary:
    get:
      operationId: getDefectSummary
      tags: [dashboard]
      summary: Get defect severity summary
      responses:
        "200":
          description: Defect summary by severity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DefectSeverityCount"

  /dashboard/execution-trend:
    get:
      operationId: getExecutionTrend
      tags: [dashboard]
      summary: Get test execution trend data
      responses:
        "200":
          description: Trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExecutionTrendPoint"

  /reports/cycle-summary/{cycleId}:
    get:
      operationId: getCycleSummary
      tags: [dashboard]
      summary: Get summary report for a test cycle
      parameters:
        - name: cycleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cycle summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CycleSummary"

  /seed:
    post:
      operationId: seedData
      tags: [health]
      summary: Seed the database with sample data
      responses:
        "200":
          description: Seed complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeedResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        department:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, role, department, isActive, createdAt]

    CreateUserBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
        department:
          type: string
      required: [name, email, role, department]

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
        department:
          type: string
        isActive:
          type: boolean

    Release:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        status:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        freezeDate:
          type: ["string", "null"]
          format: date-time
        goLiveDate:
          type: ["string", "null"]
          format: date-time
        ownerId:
          type: ["integer", "null"]
        ownerName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, name, description, status, startDate, endDate, createdAt]

    ReleaseDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        status:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        freezeDate:
          type: ["string", "null"]
          format: date-time
        goLiveDate:
          type: ["string", "null"]
          format: date-time
        ownerId:
          type: ["integer", "null"]
        ownerName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        testCycles:
          type: array
          items:
            $ref: "#/components/schemas/TestCycle"
        stats:
          $ref: "#/components/schemas/ReleaseStats"
      required: [id, name, description, status, startDate, endDate, createdAt, testCycles, stats]

    ReleaseStats:
      type: object
      properties:
        totalCycles:
          type: integer
        totalTestCases:
          type: integer
        passed:
          type: integer
        failed:
          type: integer
        blocked:
          type: integer
        notStarted:
          type: integer
        passRate:
          type: number
        openDefects:
          type: integer
      required: [totalCycles, totalTestCases, passed, failed, blocked, notStarted, passRate, openDefects]

    CreateReleaseBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        freezeDate:
          type: ["string", "null"]
          format: date-time
        goLiveDate:
          type: ["string", "null"]
          format: date-time
        ownerId:
          type: ["integer", "null"]
      required: [name, description, startDate, endDate]

    UpdateReleaseBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        freezeDate:
          type: ["string", "null"]
          format: date-time
        goLiveDate:
          type: ["string", "null"]
          format: date-time
        ownerId:
          type: ["integer", "null"]

    TestCycle:
      type: object
      properties:
        id:
          type: integer
        releaseId:
          type: integer
        name:
          type: string
        type:
          type: string
        status:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        ownerId:
          type: ["integer", "null"]
        ownerName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, releaseId, name, type, status, startDate, endDate, createdAt]

    TestCycleDetail:
      type: object
      properties:
        id:
          type: integer
        releaseId:
          type: integer
        name:
          type: string
        type:
          type: string
        status:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        ownerId:
          type: ["integer", "null"]
        ownerName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        testPlans:
